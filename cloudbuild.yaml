# VoteAI India — FINAL PRODUCTION Cloud Build Pipeline

substitutions:
  _REGION: asia-south1
  _SERVICE_NAME: voteai-india-backend
  _REPO: voteai-india
  _PROJECT_ID: election-assistant-prod

steps:
  # ── Step 1: Backend Tests ─────────────────────────
  - name: 'node:20-alpine'
    id: 'test-backend'
    dir: 'backend'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        npm ci
        npm test -- --passWithNoTests

  # ── Step 2: Frontend Type Check ───────────────────
  - name: 'node:20-alpine'
    id: 'typecheck-frontend'
    dir: 'frontend'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        npm ci
        npx tsc --noEmit

  # ── Step 3: Build Backend Docker Image ────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-backend'
    waitFor: ['test-backend']
    dir: 'backend'
    args:
      - build
      - '-t'
      - '${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO}/${_SERVICE_NAME}:latest'
      - '.'

  # ── Step 4: Push Docker Image ─────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-backend'
    waitFor: ['build-backend']
    args:
      - push
      - '${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO}/${_SERVICE_NAME}:latest'

  # ── Step 5: Deploy Backend to Cloud Run ───────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-backend'
    waitFor: ['push-backend']
    entrypoint: gcloud
    args:
      - run
      - deploy
      - '${_SERVICE_NAME}'
      - '--image=${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO}/${_SERVICE_NAME}:latest'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--set-secrets=GEMINI_API_KEY=GEMINI_API_KEY:latest'
      - '--set-secrets=FIREBASE_ADMIN_KEY=FIREBASE_ADMIN_KEY:latest'
      - '--set-env-vars=NODE_ENV=production'

  # ── Step 6: Build Frontend ───────────────────────
  - name: 'node:20-alpine'
    id: 'build-frontend'
    waitFor: ['typecheck-frontend', 'deploy-backend']
    dir: 'frontend'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        npm ci
        npm run build

  # ── Step 7: Deploy Frontend to Firebase Hosting ─
  - name: 'node:20-alpine'
    id: 'deploy-frontend'
    waitFor: ['build-frontend']
    dir: 'frontend'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        npm install -g firebase-tools
        npx firebase deploy \
          --only hosting \
          --project ${_PROJECT_ID} \
          --token=$$FIREBASE_TOKEN \
          --non-interactive
    secretEnv: ['FIREBASE_TOKEN']

timeout: '1800s'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

availableSecrets:
  secretManager:
    - versionName: projects/${_PROJECT_ID}/secrets/FIREBASE_TOKEN/versions/latest
      env: FIREBASE_TOKEN