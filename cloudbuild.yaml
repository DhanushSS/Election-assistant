# VoteAI India — Cloud Build CI/CD Pipeline
# Deploys: frontend → Cloud Run (Next.js standalone, API routes work)

steps:
  # ── Step 1: Frontend Type Check ───────────────────────────────────────────
  - name: 'node:20-alpine'
    id: 'typecheck-frontend'
    dir: 'frontend'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        set -e
        npm ci
        npx tsc --noEmit

  # ── Step 2: Build Frontend (Next.js standalone) ───────────────────────────
  # Uses cloud-sdk image so we can read GEMINI_API_KEY from Secret Manager
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'build-frontend'
    waitFor: ['typecheck-frontend']
    dir: 'frontend'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e

        # Install Node 20 inside cloud-sdk image
        curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
        apt-get install -y nodejs

        npm ci

        # Inject Firebase public env vars (non-secret, safe to hardcode)
        export NEXT_PUBLIC_FIREBASE_PROJECT_ID=election-assistant-prod
        export NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=election-assistant-prod.firebaseapp.com
        export NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=election-assistant-prod.appspot.com
        export NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=000000000000
        export NEXT_PUBLIC_FIREBASE_APP_ID=1:000000000000:web:demo
        export NEXT_PUBLIC_FIREBASE_API_KEY=placeholder

        # GEMINI_API_KEY is server-side only (used by /api/chat at runtime)
        # Not needed at build time — no need to fetch it here

        npm run build

  # ── Step 3: Build Docker Image ────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-image'
    waitFor: ['build-frontend']
    dir: 'frontend'
    args:
      - build
      - '-t'
      - 'asia-south1-docker.pkg.dev/election-assistant-prod/voteai-india/voteai-frontend:latest'
      - '-f'
      - 'Dockerfile'
      - '.'

  # ── Step 4: Push Docker Image ─────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-image'
    waitFor: ['build-image']
    args:
      - push
      - 'asia-south1-docker.pkg.dev/election-assistant-prod/voteai-india/voteai-frontend:latest'

  # ── Step 5: Deploy to Cloud Run ───────────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-cloudrun'
    waitFor: ['push-image']
    entrypoint: gcloud
    args:
      - run
      - deploy
      - 'voteai-frontend'
      - '--image=asia-south1-docker.pkg.dev/election-assistant-prod/voteai-india/voteai-frontend:latest'
      - '--region=asia-south1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=3000'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--set-secrets=GEMINI_API_KEY=GEMINI_API_KEY:latest'
      - '--set-env-vars=NODE_ENV=production,NEXT_TELEMETRY_DISABLED=1'

timeout: '1800s'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8