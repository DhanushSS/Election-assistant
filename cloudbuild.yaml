# VoteAI India — Google Cloud Build CI/CD Pipeline
# Deploys: backend → Cloud Run (asia-south1) + frontend → Firebase Hosting

substitutions:
  _REGION: asia-south1
  _SERVICE_NAME: voteai-india-backend
  _REPO: voteai-india
  _PROJECT_ID: election-assistant-prod

steps:
  # ── Step 1: Run backend tests ──────────────────────────────────────────────
  - name: 'node:20-alpine'
    id: 'test-backend'
    dir: 'backend'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        npm ci
        npm test -- --passWithNoTests

  # ── Step 2: Run frontend type-check ────────────────────────────────────────
  - name: 'node:20-alpine'
    id: 'typecheck-frontend'
    dir: 'frontend'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        npm ci
        npx tsc --noEmit

  # ── Step 3: Build backend Docker image ─────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-backend'
    waitFor: ['test-backend']
    dir: 'backend'
    args:
      - build
      - '-t'
      - '${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO}/${_SERVICE_NAME}:$COMMIT_SHA'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO}/${_SERVICE_NAME}:latest'
      - '.'

  # ── Step 4: Push to Artifact Registry ─────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-backend'
    waitFor: ['build-backend']
    args:
      - push
      - '${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO}/${_SERVICE_NAME}:$COMMIT_SHA'

  # ── Step 5: Deploy to Cloud Run ────────────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-cloudrun'
    waitFor: ['push-backend']
    entrypoint: gcloud
    args:
      - run
      - deploy
      - '${_SERVICE_NAME}'
      - '--image=${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO}/${_SERVICE_NAME}:$COMMIT_SHA'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--min-instances=1'
      - '--max-instances=10'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--port=8080'
      - '--set-secrets=GOOGLE_CLOUD_PROJECT=GOOGLE_CLOUD_PROJECT:latest'
      - '--set-secrets=FIREBASE_SERVICE_ACCOUNT_JSON=FIREBASE_SERVICE_ACCOUNT_JSON:latest'
      - '--set-env-vars=VERTEX_AI_LOCATION=us-central1,NODE_ENV=production'
      - '--service-account=voteai-backend@${_PROJECT_ID}.iam.gserviceaccount.com'

  # ── Step 6: Build frontend ─────────────────────────────────────────────────
  - name: 'node:20-alpine'
    id: 'build-frontend'
    waitFor: ['typecheck-frontend', 'deploy-cloudrun']
    dir: 'frontend'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        npm ci
        BACKEND_URL=$(gcloud run services describe voteai-india-backend \
          --region=asia-south1 --format='value(status.url)') \
        NEXT_PUBLIC_BACKEND_URL=$BACKEND_URL \
        npm run build

  # ── Step 7: Deploy Firebase Hosting ───────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-firebase'
    waitFor: ['build-frontend']
    dir: 'frontend'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        npm install -g firebase-tools
        firebase deploy --only hosting --project ${_PROJECT_ID} --non-interactive

timeout: '1800s'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

triggers:
  - name: 'push-to-main'
    github:
      name: Election-assistant
      owner: DhanushSS
      push:
        branch: '^main$'
